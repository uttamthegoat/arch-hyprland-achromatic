#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = $terminal
exec-once = nm-applet &
exec-once = waybar &
exec-once = hyprpaper
exec-once = sleep 1 && hyprctl hyprpaper preload $HOME/Wallpapers/2.png
exec-once = sleep 1 && hyprctl hyprpaper wallpaper "eDP-1,$HOME/Wallpapers/2.png"
exec-once = copyq --start-server
